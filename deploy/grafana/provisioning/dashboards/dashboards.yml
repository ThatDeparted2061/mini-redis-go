# Auto-load any dashboard JSON dropped into /var/lib/grafana/dashboards (mounted
# from deploy/grafana/dashboards) so the mini-redis dashboard exists on startup.
apiVersion: 1

providers:
  - name: mini-redis
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
